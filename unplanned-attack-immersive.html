<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Unplanned Attack — Live Incident Simulation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap');

:root {
  --bg: #0a0c0f;
  --surface: #111318;
  --surface2: #181c23;
  --border: #1e2430;
  --accent: #c8102e;
  --accent2: #ff3c5c;
  --gold: #f0a500;
  --text: #e8eaf0;
  --muted: #6b7280;
  --green: #00c96b;
  --amber: #f59e0b;
  --red: #ef4444;
  --mono: 'Share Tech Mono', monospace;
  --head: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 820px;
}

/* ── HEADER ── */
.hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.threat-badge {
  background: var(--accent);
  color: #fff;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  padding: 4px 12px 4px 10px;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%);
  animation: pulse-badge 2s ease infinite;
}
@keyframes pulse-badge {
  0%,100% { opacity:1; } 50% { opacity:.7; }
}
.hdr-title {
  font-family: var(--head);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}
#timer-display {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--gold);
}

/* ── PROGRESS ── */
.progress-row {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
}
.pdot {
  flex: 1; height: 3px;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.4s;
}
.pdot.done { background: var(--accent); }
.pdot.active { background: var(--gold); }

/* ── PHONE OVERLAY ── */
#phone-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  backdrop-filter: blur(6px);
}
#phone-overlay.show {
  display: flex;
  animation: fadeIn 0.3s ease;
}
.phone-device {
  background: #1a1d24;
  border: 2px solid #2a2d38;
  border-radius: 36px;
  width: 220px;
  padding: 28px 20px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  box-shadow: 0 0 60px rgba(200,16,46,0.25);
  animation: vibrate 0.3s linear infinite;
}
@keyframes vibrate {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-4px) rotate(-1deg); }
  40% { transform: translateX(4px) rotate(1deg); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}
.phone-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: #c8102e;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  box-shadow: 0 0 0 6px rgba(200,16,46,0.2), 0 0 0 12px rgba(200,16,46,0.08);
  animation: ring-glow 1s ease infinite;
}
@keyframes ring-glow {
  0%,100% { box-shadow: 0 0 0 6px rgba(200,16,46,0.3), 0 0 0 14px rgba(200,16,46,0.1); }
  50% { box-shadow: 0 0 0 10px rgba(200,16,46,0.15), 0 0 0 20px rgba(200,16,46,0.05); }
}
.phone-caller {
  font-family: var(--head);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  letter-spacing: 0.5px;
}
.phone-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-align: center;
}
.phone-wave {
  display: flex; gap: 4px; align-items: center; height: 24px;
}
.phone-wave span {
  display: block; width: 3px; background: var(--accent);
  border-radius: 2px;
  animation: wave 0.8s ease infinite;
}
.phone-wave span:nth-child(1) { animation-delay: 0s; height: 8px; }
.phone-wave span:nth-child(2) { animation-delay: 0.1s; height: 16px; }
.phone-wave span:nth-child(3) { animation-delay: 0.2s; height: 24px; }
.phone-wave span:nth-child(4) { animation-delay: 0.3s; height: 16px; }
.phone-wave span:nth-child(5) { animation-delay: 0.4s; height: 8px; }
@keyframes wave {
  0%,100% { transform: scaleY(0.4); opacity:0.5; }
  50% { transform: scaleY(1); opacity:1; }
}
.phone-btns {
  display: flex; gap: 32px; margin-top: 4px;
}
.btn-answer {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--green); border: none; cursor: pointer;
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 16px rgba(0,201,107,0.4);
}
.btn-answer:hover { transform: scale(1.1); box-shadow: 0 0 24px rgba(0,201,107,0.6); }
.btn-decline {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--red); border: none; cursor: pointer;
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.btn-decline:hover { transform: scale(1.1); }
.incoming-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── CHAT PANEL ── */
#chat-panel {
  display: none;
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
  flex-direction: column;
}
#chat-panel.show { display: flex; }
.chat-header {
  background: var(--surface2);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.chat-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse-badge 1.5s ease infinite;
}
.chat-name {
  font-family: var(--head);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.chat-role {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-left: auto;
  letter-spacing: 1px;
}
.chat-messages {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 120px;
}
.msg {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.msg.visible { opacity:1; transform:translateY(0); }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  font-weight: 700;
  font-family: var(--head);
}
.msg-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px 12px 12px 12px;
  padding: 10px 14px;
  max-width: 85%;
}
.msg-sender {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.msg-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.55;
}
.msg-img {
  margin-top: 10px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.msg-img img {
  width: 100%;
  max-width: 320px;
  display: block;
  border-radius: 6px;
}
.msg-time {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  margin-top: 4px;
  text-align: right;
}
.typing-indicator {
  display: flex; gap: 4px; align-items: center; padding: 4px 0;
}
.typing-indicator span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
  animation: typing 1.2s ease infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%,100% { opacity:0.3; transform:translateY(0); }
  50% { opacity:1; transform:translateY(-4px); }
}

/* ── MAIN CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px 32px 24px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.card.visible { opacity:1; transform:translateY(0); }
.card::before {
  content: '';
  position: absolute;
  top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.scene-tag {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.scene-tag::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.scene-title {
  font-family: var(--head);
  font-size: 30px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 14px;
}
.scene-body {
  font-size: 14px;
  line-height: 1.7;
  color: #b0b8c8;
  margin-bottom: 22px;
}
.scene-body strong { color: var(--gold); font-weight:500; }
.alert-box {
  background: rgba(200,16,46,0.08);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  margin-bottom: 22px;
  font-family: var(--mono);
  font-size: 11px;
  color: #ff8a9b;
  line-height: 1.6;
}
.choices { display:flex; flex-direction:column; gap:9px; }
.choice-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 13px 16px;
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  display: flex; align-items: flex-start; gap: 12px;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
}
.choice-btn::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:0;
  background:rgba(200,16,46,0.07); transition:width 0.25s;
}
.choice-btn:hover { border-color:var(--accent); transform:translateX(3px); }
.choice-btn:hover::before { width:100%; }
.choice-letter {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(200,16,46,0.12);
  padding: 2px 7px;
  border-radius: 2px;
  flex-shrink: 0;
  margin-top: 1px;
  letter-spacing: 1px;
}
.outcome {
  display:none;
  margin-top:20px; padding:16px 18px;
  border-radius: 3px;
  font-size: 13px; line-height:1.65;
  animation: fadeIn 0.4s ease;
}
.outcome.good { background:rgba(0,201,107,0.08); border-left:3px solid var(--green); color:#7fdfb0; }
.outcome.warn { background:rgba(245,158,11,0.08); border-left:3px solid var(--amber); color:#fcd27a; }
.outcome.bad  { background:rgba(239,68,68,0.08); border-left:3px solid var(--red); color:#fca5a5; }
.outcome-label { font-family:var(--mono); font-size:10px; letter-spacing:2px; opacity:0.7; margin-bottom:5px; }

.next-btn {
  display:none; margin-top:16px;
  background:var(--accent); color:#fff; border:none;
  padding:11px 26px;
  font-family:var(--head); font-size:15px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%);
  transition:background 0.2s, transform 0.15s;
}
.next-btn:hover { background:var(--accent2); transform:translateX(3px); }

/* ── SCORE ── */
.score-card {
  display:none; text-align:center; padding:12px 0;
  animation: fadeIn 0.5s ease;
}
.score-title { font-family:var(--head); font-size:42px; font-weight:900; letter-spacing:-1px; margin-bottom:6px; }
.score-subtitle { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:2px; margin-bottom:22px; }
.score-bar-wrap { margin:0 auto 24px; max-width:320px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:3px; transition:width 1s cubic-bezier(.4,0,.2,1); }
.verdict { font-size:15px; color:#b0b8c8; line-height:1.7; margin-bottom:24px; max-width:480px; margin-left:auto; margin-right:auto; }
.key-learnings {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:3px; padding:18px 22px; text-align:left; margin-bottom:22px;
}
.key-learnings h3 { font-family:var(--head); font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.key-learnings ul { list-style:none; display:flex; flex-direction:column; gap:9px; }
.key-learnings li { font-size:13px; color:#b0b8c8; display:flex; gap:10px; line-height:1.55; }
.key-learnings li::before { content:'→'; color:var(--accent); font-family:var(--mono); flex-shrink:0; }
.restart-btn {
  background:transparent; color:var(--muted); border:1px solid var(--border);
  padding:10px 24px; font-family:var(--mono); font-size:12px; letter-spacing:1px;
  cursor:pointer; border-radius:2px; transition:color 0.2s, border-color 0.2s;
}
.restart-btn:hover { color:var(--text); border-color:var(--muted); }

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── MOBILE RESPONSIVE ── */
@media(max-width:640px){
  body{padding:12px 10px 32px}
  .shell{max-width:100%}
  .hdr{gap:8px;margin-bottom:14px}
  .threat-badge{font-size:9px;padding:3px 8px}
  .hdr-title{font-size:10px}
  #timer-display{font-size:11px}
  .progress-row{gap:4px;margin-bottom:14px}
  .card{padding:18px 16px 16px}
  .scene-tag{font-size:9px}
  .scene-title{font-size:clamp(22px,7vw,30px);margin-bottom:12px}
  .scene-body{font-size:13px;margin-bottom:16px}
  .alert-box{font-size:11px;padding:9px 12px}
  .choice-btn{padding:11px 12px;font-size:13px}
  .outcome{font-size:13px;padding:12px 14px}
  .next-btn{clip-path:none;border-radius:6px;width:100%;padding:12px;text-align:center}
  .score-title{font-size:clamp(32px,10vw,42px)}
  .key-learnings{padding:14px 16px}
  .key-learnings li{font-size:12px}
  .restart-btn{width:100%;padding:11px}
  /* Phone overlay */
  #phone-overlay{padding:16px}
  .phone-device{width:195px;padding:22px 16px 26px;border-radius:28px}
  .phone-caller{font-size:16px}
  .phone-btns{gap:24px}
  .btn-answer,.btn-decline{width:46px;height:46px;font-size:20px}
  /* Chat panel */
  #chat-panel{margin-bottom:14px;border-radius:8px}
  .chat-messages{padding:10px;max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .msg-text{font-size:12px}
  .msg-bubble{max-width:90%}
  .msg-img img{max-width:100%;border-radius:4px}
}
@media(max-width:380px){
  .scene-title{font-size:20px}
  .choice-btn{font-size:12px;padding:10px 11px}
}
</style>

<!-- Firebase Tracking -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfOLbrbp4Sf9nXYuWn3Fv5k0CcqMPX1NI",
  authDomain: "systra-fraud-training.firebaseapp.com",
  databaseURL: "https://systra-fraud-training-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "systra-fraud-training",
  storageBucket: "systra-fraud-training.firebasestorage.app",
  messagingSenderId: "231886638179",
  appId: "1:231886638179:web:f7f7abed053575519afc56"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// Generate anonymous session ID
const SESSION_ID = 'sess_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
const MODULE_NAME = document.title.replace(/ —.*/, '').trim();
const startTime = Date.now();

window._fbTrack = function(eventType, data) {
  try {
    const payload = {
      session_id: SESSION_ID,
      module: MODULE_NAME,
      event: eventType,
      timestamp: new Date().toISOString(),
      ...data
    };
    push(ref(db, 'responses'), payload);
  } catch(e) { console.warn('Tracking unavailable', e); }
};

window._fbComplete = function(score, total) {
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  window._fbTrack('module_complete', {
    score, total,
    pct: Math.round(score/total*100),
    duration_seconds: elapsed
  });
};

window._fbStart = function() {
  window._fbTrack('module_start', { user_agent: navigator.userAgent.substring(0,80) });
};
</script>

<body>
<div class="shell">

  <div class="hdr">
    <div class="threat-badge">⚠ THREAT LEVEL: HIGH</div>
    <div class="hdr-title">Live Incident Simulation</div>
    <div id="timer-display">0:00</div>
  </div>

  <div class="progress-row" id="progress-row">
    <div class="pdot active" id="dot-0"></div>
    <div class="pdot" id="dot-1"></div>
    <div class="pdot" id="dot-2"></div>
    <div class="pdot" id="dot-3"></div>
  </div>

  <!-- Chat panel (shows after call answered) -->
  <div id="chat-panel">
    <div class="chat-header">
      <div class="chat-status-dot"></div>
      <div class="chat-name">SOC Alert Channel</div>
      <div class="chat-role">LIVE · ENCRYPTED</div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
  </div>

  <!-- Main scenario card -->
  <div class="card" id="main-card">
    <div id="scene-content"></div>
    <div id="outcome-box" class="outcome"></div>
    <button class="next-btn" id="next-btn">Continue →</button>
    <div class="score-card" id="score-card"></div>
  </div>

</div>

<!-- Phone call overlay -->
<div id="phone-overlay">
  <div class="incoming-label">● INCOMING CALL</div>
  <div class="phone-device">
    <div class="phone-avatar">📟</div>
    <div class="phone-caller" id="phone-caller-name">IT Security Manager</div>
    <div class="phone-sub" id="phone-caller-sub">CORPORATE · ENCRYPTED LINE</div>
    <div class="phone-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="phone-btns">
      <button class="btn-answer" id="btn-answer" title="Answer">📞</button>

</div>

// ── Audio: phone ring via Web Audio API ──
let audioCtx = null;
let ringInterval = null;

function getRingCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playRingTone() {
  const ctx = getRingCtx();
  function singleRing() {
    // Classic double-ring pattern
    [0, 0.4].forEach(delay => {
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();
      osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
      osc1.frequency.value = 480; osc2.frequency.value = 620;
      osc1.type = 'sine'; osc2.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + delay + 0.05);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + delay + 0.3);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + 0.38);
      osc1.start(ctx.currentTime + delay);
      osc2.start(ctx.currentTime + delay);
      osc1.stop(ctx.currentTime + delay + 0.4);
      osc2.stop(ctx.currentTime + delay + 0.4);
    });
  }
  singleRing();
  ringInterval = setInterval(singleRing, 2200);
}

function stopRingTone() {
  if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
}

// ── State ──
let current = 0;
let score = 0;
let answered = false;
let timerInterval;
let elapsed = 0;
let chatOpen = false;

// ── Timer ──
function startTimer() {
  timerInterval = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed/60), s = elapsed%60;
    document.getElementById('timer-display').textContent = m+':'+(s<10?'0':'')+s;
  }, 1000);
}

// ── Progress ──
function updateProgress() {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('dot-'+i);
    d.className='pdot';
    if(i<current) d.classList.add('done');
    else if(i===current) d.classList.add('active');
  }
}

// ── Chat messages ──
function addChatMessage(avatar, sender, text, imgSrc, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('chat-messages');
      // Typing indicator first
      const typing = document.createElement('div');
      typing.className = 'msg visible';
      typing.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;

      setTimeout(() => {
        typing.remove();
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.innerHTML = `
          <div class="msg-avatar">${avatar}</div>
          <div class="msg-bubble">
            <div class="msg-sender">${sender}</div>
            <div class="msg-text">${text}</div>
            ${imgSrc ? `<div class="msg-img"><img src="${imgSrc}" alt="threat intel"/></div>` : ''}
            <div class="msg-time">${timeStr}</div>
          </div>`;
        msgs.appendChild(msg);
        setTimeout(() => msg.classList.add('visible'), 30);
        msgs.scrollTop = msgs.scrollHeight;
        resolve();
      }, 1200);
    }, delay);
  });
}

// ── Show phone, trigger messages, then show scene ──
function triggerPhoneCall(scene, onDone) {
  const overlay = document.getElementById('phone-overlay');
  document.getElementById('phone-caller-name').textContent = scene.callConfig.caller;
  document.getElementById('phone-caller-sub').textContent = scene.callConfig.sub;
  overlay.classList.add('show');
  playRingTone();

  document.getElementById('btn-answer').onclick = async () => {
    stopRingTone();
    overlay.classList.remove('show');

    // Open chat panel
    const chatPanel = document.getElementById('chat-panel');
    const chatMsgs = document.getElementById('chat-messages');
    chatMsgs.innerHTML = '';
    chatPanel.classList.add('show');
    chatOpen = true;

    // Stream messages
    for (let i = 0; i < scene.callConfig.messages.length; i++) {
      const m = scene.callConfig.messages[i];
      await addChatMessage(m.avatar, m.sender, m.text, m.img, i === 0 ? 300 : 0);
      await new Promise(r => setTimeout(r, 600));
    }

    // Show scene card after messages
    setTimeout(onDone, 700);
  };

  document.getElementById('btn-decline').onclick = () => {
    stopRingTone();
    overlay.classList.remove('show');
    // Skip messages, go straight to scene
    onDone();
  };
}

function renderScene(idx) {
  answered = false;
  const s = scenes[idx];
  const card = document.getElementById('main-card');
  card.classList.remove('visible');

  // Reset card content
  setTimeout(() => {
    document.getElementById('outcome-box').style.display = 'none';
    document.getElementById('outcome-box').className = 'outcome';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('score-card').style.display = 'none';
    document.getElementById('scene-content').innerHTML = '';

    function showCard() {
      const choicesHtml = s.choices.map(c => `
        <button class="choice-btn" data-quality="${c.quality}" data-feedback="${encodeURIComponent(c.feedback)}" data-label="${c.label}">
          <span class="choice-letter">${c.letter}</span>
          <span>${c.text}</span>
        </button>`).join('');

      document.getElementById('scene-content').innerHTML = `
        <div class="scene-tag">${s.tag}</div>
        <div class="scene-title">${s.title}</div>
        <div class="scene-body">${s.body}</div>
        <div class="alert-box">${s.alert}</div>
        <div class="choices">${choicesHtml}</div>`;

      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => handleChoice(btn));
      });

      updateProgress();
      card.classList.add('visible');
    }

    triggerPhoneCall(s, showCard);
  }, current === 0 ? 100 : 250);
}

function handleChoice(btn) {
  if (answered) return;
  answered = true;
  const quality = btn.dataset.quality;
  const feedback = decodeURIComponent(btn.dataset.feedback);
  const label = btn.dataset.label;
  if (quality === 'good') score++;
  if(window._fbTrack) _fbTrack('choice', {
    scene: current,
    scene_title: scenes[current].title,
    choice: btn.dataset.quality === 'good' ? 'best' : btn.dataset.quality,
    option: Array.from(document.querySelectorAll('.choice-btn')).indexOf(btn),
    correct: quality === 'good'
  });

  document.querySelectorAll('.choice-btn').forEach(b => {
    if (b !== btn) b.style.opacity = '0.35';
    b.style.cursor = 'default';
    b.style.pointerEvents = 'none';
  });
  btn.style.borderColor = quality==='good' ? '#00c96b' : quality==='warn' ? '#f59e0b' : '#ef4444';
  btn.style.background   = quality==='good' ? 'rgba(0,201,107,0.07)' : quality==='warn' ? 'rgba(245,158,11,0.07)' : 'rgba(239,68,68,0.07)';

  const ob = document.getElementById('outcome-box');
  ob.className = `outcome ${quality==='good'?'good':quality==='warn'?'warn':'bad'}`;
  ob.innerHTML = `<div class="outcome-label">${label}</div>${feedback}`;
  ob.style.display = 'block';

  const nb = document.getElementById('next-btn');
  nb.style.display = 'inline-block';
  nb.textContent = current < scenes.length-1 ? 'Continue →' : 'See Results →';
}

function showResults() {
  clearInterval(timerInterval);
  if(window._fbComplete) _fbComplete(score, scenes.length);
  const card = document.getElementById('main-card');
  card.classList.remove('visible');
  document.getElementById('chat-panel').classList.remove('show');

  setTimeout(() => {
    document.getElementById('scene-content').innerHTML = '';
    document.getElementById('outcome-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    const pct = Math.round((score/scenes.length)*100);
    const color = pct>=75?'#00c96b':pct>=50?'#f59e0b':'#ef4444';
    const verdict = pct===100
      ? "Outstanding. You made every correct call under pressure. Your organisation is in strong hands."
      : pct>=75 ? "Strong performance. Solid threat awareness throughout. Review the moments where you hesitated."
      : pct>=50 ? "Adequate, but gaps remain. In a real incident, those gaps get exploited. Study the key learnings."
      : "Critical blind spots revealed. Cybersecurity awareness training is strongly recommended for your team.";

    const sc = document.getElementById('score-card');
    sc.style.display = 'block';
    sc.innerHTML = `
      <div class="score-title" style="color:${color}">${score} / ${scenes.length}</div>
      <div class="score-subtitle">CORRECT RESPONSES</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" id="sbar" style="width:0%;background:${color}"></div></div>
      <div class="verdict">${verdict}</div>
      <div class="key-learnings">
        <h3>Key Learnings</h3>
        <ul>
          <li>Activate your Incident Response Plan immediately — never wait for more information.</li>
          <li>Unknown attack vectors require a 360° defence across IT, physical security, HR, and communications.</li>
          <li>Never engage with suspicious links during an active threat. Preserve evidence and escalate to the SOC.</li>
          <li>Post-incident reviews are not optional — they are where organisational resilience is built.</li>
        </ul>
      </div>
      <button class="restart-btn" id="restart-btn">↺ Restart Scenario</button>`;

    for (let i=0;i<4;i++) document.getElementById('dot-'+i).className='pdot done';
    card.classList.add('visible');
    setTimeout(() => { document.getElementById('sbar').style.width = pct+'%'; }, 300);
    document.getElementById('restart-btn').addEventListener('click', () => {
      current=0; score=0; elapsed=0;
      document.getElementById('timer-display').textContent='0:00';
      startTimer(); renderScene(0);
    });
  }, 250);
}

document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  if (current >= scenes.length) showResults();
  else renderScene(current);
});

// ── Init ──
startTimer();
renderScene(0);
setTimeout(() => document.getElementById('main-card').classList.add('visible'), 100);
</script>
